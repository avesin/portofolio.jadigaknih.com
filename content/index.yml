faq:
  title: "Frequently Asked Questions"
  description: "Answers about my technical expertise and engineering background."

  categories:
    - title: "Technical Expertise"
      questions:
        - label: "What technologies do you specialize in?"
          content: I specialize in mobile development including Android (Kotlin, Jetpack Compose), iOS (Swift, Objective-C), Flutter, and React Native. I also work with backend systems using Node.js, Laravel, Next.js, and Nest.js.

        - label: "Do you have DevOps experience?"
          content: |
            Yes. I have built CI/CD pipelines using GitLab CI, managed Kubernetes clusters, and optimized cloud infrastructure on AWS and GCP.

        - label: "Do you lead engineering teams?"
          content: |
            Yes. I have experience leading teams of engineers, mentoring developers, conducting code reviews, and coordinating with product managers.

    - title: "Projects"
      questions:
        - label: "What industries have you worked in?"
          content: |
            Most of my work has been in fintech, mobile platforms, and enterprise software systems.

        - label: "What are your biggest technical achievements?"
          content: |
            Leading engineering teams, building scalable mobile architectures, optimizing cloud infrastructure costs, and delivering complex mobile applications used by large user bases.

