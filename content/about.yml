title: About Me
description: Learn more about my journey as a senior software engineer, my experience building mobile and full-stack applications, and my role as the owner of Jadigaknih.com application portal.

content: |
  Hi, I'm **Nur Avesina Mustari**, a Senior Software Engineer with over 9 years of experience specializing in mobile and full-stack development.

  My journey began with a degree in Information Technology from **UIN Sunan Kalijaga Yogyakarta**, where I built a strong foundation in software engineering. Since then, I’ve worked across a wide range of technologies, focusing on mobile development including Android (Kotlin & Jetpack Compose), iOS (Swift & Objective-C), and cross-platform frameworks like Flutter and React Native.

  Over the years, I’ve also expanded into backend and full-stack development using Node.js, Laravel, Next.js, and Nest.js, enabling me to build scalable, end-to-end systems.

  ### Founder & Product Builder

  In addition to my professional experience, I am the **owner and builder of Jadigaknih.com**, an application portal designed to explore and validate ideas through real products.

  Through this platform, I focus on:
  - Building and launching experimental applications
  - Validating product ideas quickly
  - Applying modern full-stack and cloud technologies
  - Continuously improving user experience and performance

  This initiative reflects my passion not just for engineering, but also for **product thinking and innovation**.

  ### My Engineering Philosophy

  My approach to engineering is rooted in **scalability**, **maintainability**, and **real-world impact**. I believe great software is not just about writing code, but about solving the right problems efficiently.

  I focus on building systems that are clean, reliable, and easy to evolve. Whether it’s architecting mobile applications, optimizing backend performance, or designing infrastructure, I aim to deliver solutions that are both technically sound and business-driven.

  ### What Drives Me

  I enjoy tackling complex technical challenges and turning them into simple, scalable solutions. From improving application performance to designing system architecture and leading engineering teams, I’m driven by continuous learning and innovation.

  I’m also passionate about mentoring developers, sharing knowledge, and helping teams grow while maintaining high engineering standards.

  ### Beyond Work

  Outside of engineering, I enjoy exploring new technologies, building side projects, and continuously experimenting with new ideas through my own platforms.

  Thanks for visiting my portfolio. Feel free to explore my [projects](/projects) or [get in touch](/#contact) if you'd like to collaborate!

