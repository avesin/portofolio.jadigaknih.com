about:
  title: "About Me"
  description: |
    I am a seasoned software engineer with more than 9 years of experience specializing in mobile development and scalable backend systems.

    My core expertise includes Android development with Kotlin and Jetpack Compose, iOS development with Swift and Objective-C, and cross-platform frameworks such as Flutter and React Native.

    I also work extensively with backend and full-stack technologies including Node.js, Laravel, Next.js, and Nest.js.

    In addition to development, I have strong experience in DevOps, cloud infrastructure, and Agile engineering leadership. I have led engineering teams, improved system performance, optimized cloud costs, and delivered high-quality software solutions in fintech and enterprise environments.

